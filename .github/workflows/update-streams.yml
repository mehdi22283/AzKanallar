name: IPTV Update Streams

on:
  schedule:
    # Hər 10 dəqiqədən bir işlədir
    - cron: '*/10 * * * *'
  workflow_dispatch: # Manual işlətmək üçün düymə yaradır

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Repozitoriyanı yoxla
        uses: actions/checkout@v3

      - name: Python mühitini qur
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Kitabxanaları yüklə
        run: pip install requests urllib3

      - name: Linkləri yoxla və faylları yenilə
        run: python update_streams.py

      - name: Dəyişiklikləri Github-a göndər (Push)
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add streams/
          # Əgər heç bir dəyişiklik yoxdursa, xəta verməməsi üçün || true əlavə olunub
          git commit -m "Avtomatik yenilənmə: IPTV linkləri" || true
          git push
          
