name: IPTV Kanalları Yenilə

on:
  schedule:
    # Hər 10 dəqiqədən bir işə salır
    - cron: '*/10 * * * *'
  workflow_dispatch: # İstədiyiniz an əllə də başladabilmək üçün

permissions:
  contents: write

jobs:
  update-links:
    runs-on: ubuntu-latest

    steps:
    - name: Reponu Kopyala
      uses: actions/checkout@v4

    - name: Python Quraşdır
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Lazımi Kitabxanaları Yüklə
      run: |
        python -m pip install --upgrade pip
        pip install requests

    - name: Linkləri Yoxla və Çeşidlə
      run: python check_streams.py

    - name: Dəyişiklikləri GitHub-a Göndər
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add streams/*.m3u8
        # Yalnız dəyişiklik varsa commit etsin ki, xəta verməsin
        git diff --staged --quiet || (git commit -m "Uptade: Kanalların linkləri yeniləndi [cron]" && git push)
